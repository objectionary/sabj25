---
name: benchmark
'on':
  push:
    branches:
      - master
    paths-ignore: [ 'README.md', '.github' ]
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
jobs:
  benchmark:
    name: 'benchmark (${{ matrix.name }})'
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distribution: temurin
            name: 'Temurin 25'
            order: 1
          - distribution: zulu
            name: 'Zulu 25'
            order: 2
          - distribution: corretto
            name: 'Corretto 25'
            order: 3
          - distribution: graalvm
            name: 'GraalVM 25'
            order: 4
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.distribution }}
          java-version: 25
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ubuntu-${{ matrix.distribution }}-jdk-25-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ubuntu-${{ matrix.distribution }}-jdk-25-maven-
      - run: mvn clean test --errors --batch-mode
      - run: |
          mkdir -p jmh
          cp target/jmh-result.csv jmh/result.csv
          printf '%s' '${{ matrix.name }}' > jmh/name.txt
      - uses: actions/upload-artifact@v6
        with:
          name: jmh-${{ matrix.order }}-${{ matrix.distribution }}
          path: jmh/
  merge:
    needs: benchmark
    if: ${{ !cancelled() }}
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: jmh-*
      - run: .github/benchmark.sh
      - uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          add-paths: README.md
          branch: benchmark
          commit-message: 'new benchmark results'
          delete-branch: true
          title: 'New benchmarking results'
          assignees: yegor256
          base: master
